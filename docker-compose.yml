services:
  api:
    build: .
    command: uvicorn src.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./model_registry:/app/model_registry
      - ./outputs:/app/outputs
      - ./logs:/app/logs
    restart: unless-stopped

  trainer:
    build: .
    command: python train.py
    volumes:
      - ./model_registry:/app/model_registry
      - ./outputs:/app/outputs
      - ./logs:/app/logs
    profiles:
      - training
