<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sales Forecasting Dashboard</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --panel: #ffffff;
      --ink: #1f2937;
      --muted: #687385;
      --line: #d9dee8;
      --blue: #2563eb;
      --green: #0f9f6e;
      --amber: #b45309;
      --red: #dc2626;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px 20px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 750;
    }

    .subtle {
      color: var(--muted);
      font-size: 14px;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 22px 20px 36px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 150px auto auto;
      gap: 12px;
      align-items: end;
      margin-bottom: 18px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    select,
    input,
    button {
      height: 40px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 6px;
      font: inherit;
    }

    select,
    input {
      padding: 0 10px;
    }

    button {
      padding: 0 14px;
      border-color: #1d4ed8;
      background: var(--blue);
      color: white;
      cursor: pointer;
      font-weight: 700;
    }

    button.secondary {
      background: var(--panel);
      color: var(--blue);
    }

    .grid {
      display: grid;
      grid-template-columns: 1.8fr 1fr;
      gap: 18px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 16px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px;
      min-height: 78px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .metric strong {
      font-size: 20px;
    }

    .chart {
      width: 100%;
      min-height: 360px;
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
    }

    svg {
      display: block;
      width: 100%;
      height: 360px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 10px 8px;
      text-align: left;
      white-space: nowrap;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 13px;
      color: var(--muted);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--amber);
    }

    .dot.ok {
      background: var(--green);
    }

    .error {
      color: var(--red);
      font-weight: 700;
      margin-top: 10px;
    }

    @media (max-width: 860px) {
      .toolbar,
      .grid,
      .metrics {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <div>
        <h1>Sales Forecasting Dashboard</h1>
        <div class="subtle">State-level weekly forecasts, model comparison, and service health</div>
      </div>
      <div class="status"><span id="health-dot" class="dot"></span><span id="health-text">Checking service</span></div>
    </div>
  </header>

  <main>
    <section class="toolbar">
      <label>
        State
        <select id="state-select"></select>
      </label>
      <label>
        Weeks
        <input id="weeks-input" type="number" min="1" max="52" value="8">
      </label>
      <button id="forecast-button">Forecast</button>
      <button id="bulk-button" class="secondary">Bulk Sample</button>
    </section>

    <section class="grid">
      <div class="panel">
        <h2>Forecast</h2>
        <div class="metrics">
          <div class="metric"><span>Best Model</span><strong id="metric-model">-</strong></div>
          <div class="metric"><span>MAPE</span><strong id="metric-mape">-</strong></div>
          <div class="metric"><span>RMSE</span><strong id="metric-rmse">-</strong></div>
        </div>
        <div class="chart"><svg id="forecast-chart" role="img" aria-label="Forecast chart"></svg></div>
        <div id="message" class="error"></div>
      </div>

      <div class="panel">
        <h2>Forecast Values</h2>
        <table>
          <thead>
            <tr><th>Date</th><th>Predicted Sales</th></tr>
          </thead>
          <tbody id="forecast-table"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const stateSelect = document.getElementById("state-select");
    const weeksInput = document.getElementById("weeks-input");
    const forecastButton = document.getElementById("forecast-button");
    const bulkButton = document.getElementById("bulk-button");
    const message = document.getElementById("message");

    const formatNumber = new Intl.NumberFormat("en-US", { maximumFractionDigits: 0 });
    const formatPct = new Intl.NumberFormat("en-US", { maximumFractionDigits: 2 });

    async function getJson(url, options) {
      const response = await fetch(url, options);
      const payload = await response.json();
      if (!response.ok) {
        const detail = typeof payload.detail === "string" ? payload.detail : payload.detail?.message || "Request failed";
        throw new Error(detail);
      }
      return payload;
    }

    async function loadHealth() {
      try {
        const health = await getJson("/health/detailed");
        document.getElementById("health-dot").className = `dot ${health.status === "ok" ? "ok" : ""}`;
        document.getElementById("health-text").textContent = `${health.status} · ${health.trained_states} trained state(s)`;
      } catch (error) {
        document.getElementById("health-text").textContent = "Service unavailable";
      }
    }

    async function loadStates() {
      const data = await getJson("/states");
      stateSelect.innerHTML = "";
      data.states.forEach((state) => {
        const option = document.createElement("option");
        option.value = state;
        option.textContent = state;
        stateSelect.appendChild(option);
      });
    }

    async function loadModel(state) {
      const data = await getJson(`/models/${encodeURIComponent(state)}`);
      const best = data.comparison[data.best_model] || {};
      document.getElementById("metric-model").textContent = data.best_model || "-";
      document.getElementById("metric-mape").textContent = best.mape ? `${formatPct.format(best.mape)}%` : "-";
      document.getElementById("metric-rmse").textContent = best.rmse ? formatNumber.format(best.rmse) : "-";
    }

    function drawChart(rows) {
      const svg = document.getElementById("forecast-chart");
      const width = 760;
      const height = 360;
      const pad = 46;
      svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
      svg.innerHTML = "";

      if (!rows.length) return;

      const values = rows.map((row) => row.predicted_sales);
      const min = Math.min(...values) * 0.96;
      const max = Math.max(...values) * 1.04;
      const span = Math.max(max - min, 1);

      const x = (i) => pad + (i * (width - pad * 2)) / Math.max(rows.length - 1, 1);
      const y = (value) => height - pad - ((value - min) * (height - pad * 2)) / span;
      const points = rows.map((row, i) => `${x(i)},${y(row.predicted_sales)}`).join(" ");

      svg.insertAdjacentHTML("beforeend", `<line x1="${pad}" y1="${height - pad}" x2="${width - pad}" y2="${height - pad}" stroke="#d9dee8"/>`);
      svg.insertAdjacentHTML("beforeend", `<line x1="${pad}" y1="${pad}" x2="${pad}" y2="${height - pad}" stroke="#d9dee8"/>`);
      svg.insertAdjacentHTML("beforeend", `<polyline fill="none" stroke="#2563eb" stroke-width="3" points="${points}"/>`);

      rows.forEach((row, i) => {
        svg.insertAdjacentHTML("beforeend", `<circle cx="${x(i)}" cy="${y(row.predicted_sales)}" r="4" fill="#2563eb"/>`);
      });

      const first = rows[0].date;
      const last = rows[rows.length - 1].date;
      svg.insertAdjacentHTML("beforeend", `<text x="${pad}" y="${height - 14}" fill="#687385" font-size="12">${first}</text>`);
      svg.insertAdjacentHTML("beforeend", `<text x="${width - pad}" y="${height - 14}" fill="#687385" font-size="12" text-anchor="end">${last}</text>`);
      svg.insertAdjacentHTML("beforeend", `<text x="${pad + 6}" y="${pad - 16}" fill="#687385" font-size="12">${formatNumber.format(max)}</text>`);
    }

    function renderForecast(data) {
      const table = document.getElementById("forecast-table");
      table.innerHTML = "";
      data.forecast.forEach((row) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${row.date}</td><td>${formatNumber.format(row.predicted_sales)}</td>`;
        table.appendChild(tr);
      });
      drawChart(data.forecast);
    }

    async function refreshForecast() {
      message.textContent = "";
      const state = stateSelect.value;
      const weeks = Number(weeksInput.value || 8);
      try {
        await loadModel(state);
        const data = await getJson(`/forecast/${encodeURIComponent(state)}?weeks=${weeks}`);
        renderForecast(data);
      } catch (error) {
        message.textContent = error.message;
      }
    }

    async function runBulkSample() {
      message.textContent = "";
      const states = Array.from(stateSelect.options).slice(0, 3).map((option) => option.value);
      try {
        const data = await getJson("/forecast/bulk", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ states, weeks: Number(weeksInput.value || 8) }),
        });
        message.textContent = `Bulk forecast returned ${data.forecasts.length} result(s).`;
      } catch (error) {
        message.textContent = error.message;
      }
    }

    forecastButton.addEventListener("click", refreshForecast);
    bulkButton.addEventListener("click", runBulkSample);
    stateSelect.addEventListener("change", refreshForecast);

    (async function init() {
      try {
        await loadHealth();
        await loadStates();
        await refreshForecast();
      } catch (error) {
        message.textContent = error.message;
      }
    })();
  </script>
</body>
</html>
